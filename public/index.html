<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mdX</title>
  <link rel="preload" href="app.bundle.js" as="script" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 侧边栏: 扁平时间流文件列表 -->
  <div id="sidebar">
    <div id="sidebar-actions">
      <button id="sidebar-add-workspace" title="添加文件夹">+ 添加文件夹</button>
      <button id="sidebar-new-note" title="新建笔记">+ 新建笔记</button>
    </div>
    <div id="sidebar-list"></div>
  </div>

  <!-- 双栏分屏容器 -->
  <div id="split-container">
    <div id="editor-pane">
      <button id="sidebar-toggle" title="折叠/展开目录">隐藏目录</button>
      <button id="preview-toggle" title="折叠/展开预览">隐藏预览</button>
      <div id="editor"></div>
    </div>
    <div id="divider"></div>
    <div id="preview-pane"><div id="preview"></div></div>
  </div>

  <div id="status-bar" class="idle"><span id="status-text"></span></div>
  <div id="boot-timing"></div>

  <script src="app.bundle.js"></script>
</body>
</html>
